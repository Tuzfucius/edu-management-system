openapi: 3.0.3
info:
  title: 教务管理系统 API
  version: 0.2.0
  description: |
    统一响应结构为 `{ code, message, data }`，其中 `code === 200` 表示业务成功。
    当前版本覆盖登录、基础数据、用户、学生、教师、任课、选课成绩、教师指导学生和报表接口。
servers:
  - url: http://localhost:8080/edu
    description: 本地 Spring Boot 服务
tags:
  - name: Auth
  - name: College
  - name: Major
  - name: Department
  - name: ClassInfo
  - name: Course
  - name: User
  - name: Student
  - name: Teacher
  - name: TeachingTask
  - name: StudentCourse
  - name: TeacherStudent
  - name: Report
paths:
  /api/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      requestBody:
        $ref: '#/components/requestBodies/Login'
      responses:
        '200':
          $ref: '#/components/responses/Result'
  /api/auth/me:
    get:
      tags: [Auth]
      summary: 获取当前登录用户
      responses:
        '200':
          $ref: '#/components/responses/Result'
  /api/auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      responses:
        '200':
          $ref: '#/components/responses/Result'
  /api/colleges:
    get: { tags: [College], summary: 学院列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [College], summary: 新增学院, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/colleges/{id}:
    get: { tags: [College], summary: 学院详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [College], summary: 修改学院, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [College], summary: 停用学院, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/majors:
    get: { tags: [Major], summary: 专业列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [Major], summary: 新增专业, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/majors/{id}:
    get: { tags: [Major], summary: 专业详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [Major], summary: 修改专业, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [Major], summary: 停用专业, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/departments:
    get: { tags: [Department], summary: 教研室列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [Department], summary: 新增教研室, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/departments/{id}:
    get: { tags: [Department], summary: 教研室详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [Department], summary: 修改教研室, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [Department], summary: 停用教研室, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/classes:
    get: { tags: [ClassInfo], summary: 班级列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [ClassInfo], summary: 新增班级, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/classes/{id}:
    get: { tags: [ClassInfo], summary: 班级详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [ClassInfo], summary: 修改班级, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [ClassInfo], summary: 停用班级, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/courses:
    get: { tags: [Course], summary: 课程列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [Course], summary: 新增课程, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/courses/{id}:
    get: { tags: [Course], summary: 课程详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [Course], summary: 修改课程, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [Course], summary: 停用课程, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/users:
    get: { tags: [User], summary: 用户列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [User], summary: 新增用户, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/users/{id}:
    get: { tags: [User], summary: 用户详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [User], summary: 修改用户, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [User], summary: 停用用户, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/students:
    get: { tags: [Student], summary: 学生列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [Student], summary: 新增学生, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/students/{id}:
    get: { tags: [Student], summary: 学生详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [Student], summary: 修改学生, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [Student], summary: 停用学生, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/students/by-user/{userId}:
    get: { tags: [Student], summary: 根据登录用户查询学生档案, parameters: [ { name: userId, in: path, required: true, schema: { type: integer, format: int64 } } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teachers:
    get: { tags: [Teacher], summary: 教师列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [Teacher], summary: 新增教师, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teachers/{id}:
    get: { tags: [Teacher], summary: 教师详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [Teacher], summary: 修改教师, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [Teacher], summary: 停用教师, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teachers/by-user/{userId}:
    get: { tags: [Teacher], summary: 根据登录用户查询教师档案, parameters: [ { name: userId, in: path, required: true, schema: { type: integer, format: int64 } } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teaching-tasks:
    get: { tags: [TeachingTask], summary: 任课列表, parameters: [ { name: teacherId, in: query, required: false, schema: { type: integer, format: int64 } } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [TeachingTask], summary: 新增任课, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teaching-tasks/{id}:
    get: { tags: [TeachingTask], summary: 任课详情, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    put: { tags: [TeachingTask], summary: 修改任课, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [TeachingTask], summary: 停用任课, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/student-courses:
    get: { tags: [StudentCourse], summary: 选课成绩列表, parameters: [ { name: studentId, in: query, required: false, schema: { type: integer, format: int64 } }, { name: teacherId, in: query, required: false, schema: { type: integer, format: int64 } } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [StudentCourse], summary: 学生选课, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/student-courses/selectable:
    get: { tags: [StudentCourse], summary: 学生可选课程, parameters: [ { name: studentId, in: query, required: true, schema: { type: integer, format: int64 } }, { name: semester, in: query, required: true, schema: { type: string } } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/student-courses/{id}:
    delete: { tags: [StudentCourse], summary: 学生退课, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/student-courses/{id}/score:
    put: { tags: [StudentCourse], summary: 录入或修改成绩, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teacher-students:
    get: { tags: [TeacherStudent], summary: 指导关系列表, responses: { '200': { $ref: '#/components/responses/Result' } } }
    post: { tags: [TeacherStudent], summary: 新增指导关系, requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/teacher-students/{id}:
    put: { tags: [TeacherStudent], summary: 修改指导关系, parameters: [ { $ref: '#/components/parameters/Id' } ], requestBody: { $ref: '#/components/requestBodies/JsonObject' }, responses: { '200': { $ref: '#/components/responses/Result' } } }
    delete: { tags: [TeacherStudent], summary: 停用指导关系, parameters: [ { $ref: '#/components/parameters/Id' } ], responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/reports/overview:
    get: { tags: [Report], summary: 概览统计, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/reports/college-students:
    get: { tags: [Report], summary: 学院学生人数, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/reports/grade-distribution:
    get: { tags: [Report], summary: 成绩分布, responses: { '200': { $ref: '#/components/responses/Result' } } }
  /api/reports/teaching-load:
    get: { tags: [Report], summary: 教师任课工作量, responses: { '200': { $ref: '#/components/responses/Result' } } }
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  requestBodies:
    Login:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [username, password, role]
            properties:
              username: { type: string, example: admin }
              password: { type: string, example: '123456' }
              role: { type: string, enum: [ADMIN, TEACHER, STUDENT] }
    JsonObject:
      required: true
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
  responses:
    Result:
      description: 统一响应。业务失败时 HTTP 状态仍通常为 200，但 code 为 500 或 401。
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Result'
  schemas:
    Result:
      type: object
      properties:
        code:
          type: integer
          example: 200
        message:
          type: string
          example: success
        data:
          nullable: true
          description: 具体数据对象、数组或 null。
