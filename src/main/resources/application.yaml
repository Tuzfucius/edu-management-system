server:
  port: 8080
  servlet:
    context-path: /edu

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/edu_management_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}

logging:
  file:
    name: logs/edu-management-system.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId:-}] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%X{requestId:-}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.tzufucius.edu.edumanagementsystem: DEBUG
