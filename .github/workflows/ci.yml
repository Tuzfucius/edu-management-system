name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ========================================
  # Backend: Maven 构建 + 测试
  # 使用 MySQL service 容器运行真实数据库测试
  # ========================================
  backend:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: edu_management_system
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install MySQL client
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mysql-client

      - name: Initialize test database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u root -proot < sql/01_create_database.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot -D edu_management_system < sql/02_create_tables.sql
          mysql -h 127.0.0.1 -P 3306 -u root -proot -D edu_management_system < sql/03_insert_sample_data.sql

      - name: Build and test with Maven
        run: |
          chmod +x mvnw
          ./mvnw verify -B
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/edu_management_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
          DB_USERNAME: root
          DB_PASSWORD: root

  # ========================================
  # Frontend: NPM 依赖安装 + 构建验证
  # ========================================
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  # ========================================
  # Docker: 验证镜像可构建
  # ========================================
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend/Dockerfile
          tags: edu-backend:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend/Dockerfile
          tags: edu-frontend:ci
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
