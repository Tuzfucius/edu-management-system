services:
  # =====================
  # MySQL 数据库
  # =====================
  mysql:
    image: mysql:8.0
    container_name: edu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpassword}
      MYSQL_DATABASE: edu_management_system
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # =====================
  # Spring Boot 后端
  # =====================
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: edu-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/edu_management_system?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # =====================
  # Nginx 前端
  # =====================
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: edu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mysql-data:
